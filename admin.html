<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商家后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
header{background:#111;color:#fff;padding:16px}
.container{max-width:900px;margin:30px auto;padding:0 16px}
.login-box{max-width:400px;margin:50px auto;text-align:center}
input{width:100%;padding:10px;margin:10px 0;border:1px solid #ddd;border-radius:6px}
.btn{padding:10px 16px;border:none;border-radius:6px;cursor:pointer;margin:4px}
.btn-ok{background:#00b341;color:#fff}
.btn-no{background:#f00;color:#fff}
.order-card{border:1px solid #eee;padding:16px;margin:12px 0;border-radius:8px}
</style>
</head>
<body>
<div class="container" id="loginWrap">
  <div class="login-box">
    <h2>商家登录</h2>
    <input type="password" id="pwdInput" placeholder="输入后台密码">
    <button class="btn btn-ok" onclick="login()">登录后台</button>
  </div>
</div>
<div class="container" id="adminWrap" style="display:none">
  <h2>全部订单管理</h2>
  <div id="orderList"></div>
</div>

<script>
const API_BASE = "https://hidden-mouse-2636.bmk4byvf9b.workers.dev";
let adminPwd = "";

async function login(){
  adminPwd = document.getElementById("pwdInput").value.trim();
  if(!adminPwd){
    alert("请输入密码");
    return;
  }
  const res = await fetch(`${API_BASE}/api/admin/list?pwd=${adminPwd}`);
  const data = await res.json();
  if(data.err){
    alert("密码错误，无法登录");
    return;
  }
  document.getElementById("loginWrap").style.display = "none";
  document.getElementById("adminWrap").style.display = "block";
  renderOrders(data);
}

function renderOrders(list){
  const wrap = document.getElementById("orderList");
  wrap.innerHTML = "";
  if(list.length === 0){
    wrap.innerHTML = "<p>暂无订单</p>";
    return;
  }
  list.forEach(item=>{
    let statusText = item.status;
    wrap.innerHTML += `
      <div class="order-card">
        <p>订单号：${item.order_no}</p>
        <p>演出：${item.event_name}</p>
        <p>购票人：${item.username} | ${item.contact}</p>
        <p>当前状态：${statusText}</p>
        ${item.pay_img ? `<p>付款凭证：<a href="${item.pay_img}" target="_blank">点击查看截图</a></p>` : "<p>未上传付款截图</p>"}
        ${item.status === "checking" ? `
          <button class="btn btn-ok" onclick="setPaid('${item.order_no}')">确认收款</button>
          <button class="btn btn-no" onclick="setReject('${item.order_no}')">驳回订单</button>
        ` : ""}
      </div>
    `
  })
}

async function setPaid(orderNo){
  const res = await fetch(`${API_BASE}/api/admin/set-status`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({pwd:adminPwd,orderNo,status:"paid"})
  });
  alert("操作成功，刷新页面");
  location.reload();
}

async function setReject(orderNo){
  const res = await fetch(`${API_BASE}/api/admin/set-status`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({pwd:adminPwd,orderNo,status:"reject"})
  });
  alert("已驳回订单，刷新页面");
  location.reload();
}
</script>
</body>
</html>
