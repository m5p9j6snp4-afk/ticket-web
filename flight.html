<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Clerk登录SDK -->
<script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"></script>
<title>机票预订 | Re旅行</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif}
body{background:#f8f9fa;padding-bottom:70px}
.back{padding:16px 20px}
.back a{text-decoration:none;color:#111}
.tab-switch{display:flex;margin:0 20px 16px}
.tab-switch div{flex:1;text-align:center;padding:12px;background:#eee;cursor:pointer}
.tab-switch div.active{background:#111;color:#fff}
.form-box{margin:0 20px}
.form-item{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px}
.form-item label{font-size:13px;color:#666;display:block;margin-bottom:6px}
select,input{width:100%;padding:12px;border:1px solid #eee;border-radius:10px;font-size:15px;cursor:pointer}
.btn-search{width:100%;margin-top:20px;padding:14px;background:#111;color:#fff;border:0;border-radius:12px;font-size:16px;cursor:pointer}
/* 底部导航统一样式 */
.bottom-tab{position:fixed;bottom:0;left:0;width:100%;background:#fff;display:flex;border-top:1px solid #eee;z-index:999}
.tab{flex:1;text-align:center;padding:10px 0;cursor:pointer}
.tab p{font-size:12px;color:#777;margin-top:3px;pointer-events:none}
.tab.active p{color:#111;font-weight:500}
</style>
</head>
<body>
<div class="back"><a href="/">← 返回首页</a></div>

<div class="tab-switch">
  <div class="active" onclick="setTripType('one')" id="tabOne">单程</div>
  <div onclick="setTripType('round')" id="tabRound">往返</div>
</div>

<div class="form-box">
  <div class="form-item">
    <label>出发城市</label>
    <select id="depart">
      <option>香港 HKG</option>
      <option>澳门 MFM</option>
      <option>深圳 SZX</option>
      <option>上海 PVG</option>
      <option>东京 NRT</option>
      <option>首尔 ICN</option>
    </select>
  </div>
  <div class="form-item">
    <label>目的地</label>
    <select id="arrive">
      <option>香港 HKG</option>
      <option>澳门 MFM</option>
      <option>深圳 SZX</option>
      <option>上海 PVG</option>
      <option>东京 NRT</option>
      <option>首尔 ICN</option>
    </select>
  </div>
  <div class="form-item">
    <label>出发日期</label>
    <input type="date" id="goDate">
  </div>
  <div class="form-item" id="returnBox" style="display:none">
    <label>返程日期</label>
    <input type="date" id="backDate">
  </div>

  <button class="btn-search" onclick="searchFlight()">查询航班</button>
</div>

<!-- 全站统一可点击底部导航 -->
<div class="bottom-tab">
  <div class="tab" onclick="location.href='/'"><p>首页</p></div>
  <div class="tab" onclick="location.href='/message.html'"><p>讯息</p></div>
  <div class="tab" onclick="location.href='/admin-add-event.html'"><p>发布</p></div>
  <div class="tab" onclick="location.href='/mine.html'"><p>我的行程</p></div>
  <div class="tab" onclick="location.href='/account.html'"><p>账户</p></div>
</div>

<script>
const API_BASE = "https://hidden-mouse-2636.bmk4byvf9b.workers.dev";
const CLERK_PUB_KEY = "pk_test_dG9wLWFudC0xLmNsZXJrLmFjY291bnRzLmRldiQ";
const clerk = new Clerk(CLERK_PUB_KEY);
let tripType = "one";

// 页面初始化 Clerk登录校验
window.onload = async function(){
  await clerk.load();
  const user = clerk.user;
  if(!user){
    alert("请先登录账号后预订机票");
    location.href="/";
    return;
  }
}

// 切换单程/往返
function setTripType(type){
  tripType = type;
  document.getElementById("tabOne").classList.remove("active");
  document.getElementById("tabRound").classList.remove("active");
  if(type === "one"){
    document.getElementById("tabOne").classList.add("active");
    document.getElementById("returnBox").style.display = "none";
  }else{
    document.getElementById("tabRound").classList.add("active");
    document.getElementById("returnBox").style.display = "block";
  }
}

function searchFlight(){
  const depart = document.getElementById("depart").value;
  const arrive = document.getElementById("arrive").value;
  const go = document.getElementById("goDate").value;
  if(!depart||!arrive||!go){
    alert("请填写出发、目的地、出发日期");
    return;
  }
  let msg = `行程类型：${tripType==="one"?"单程":"往返"}\n出发：${depart}\n目的地：${arrive}\n出发日：${go}`;
  if(tripType==="round") msg += `\n返程日：${document.getElementById("backDate").value}`;
  alert(msg);
  // 跳转航班下单页 flight-buy.html
}
</script>
</body>
</html>
