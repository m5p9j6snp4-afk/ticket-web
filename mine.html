<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的订单</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
header{background:#111;color:#fff;padding:16px;display:flex;gap:24px}
header a{color:#fff;text-decoration:none}
.container{max-width:700px;margin:30px auto;padding:0 16px}
.order-card{border:1px solid #eee;border-radius:10px;padding:16px;margin-bottom:16px}
.status-unpaid{color:#999}
.status-checking{color:#ff9500}
.status-paid{color:#00b341}
.status-reject{color:#f00}
</style>
</head>
<body>
<header>
  <a href="/">首页</a>
</header>
<div class="container">
  <h2>我的订单</h2>
  <div id="orderList"></div>
</div>
<script>
const API_BASE = "https://hidden-mouse-2636.bmk4byvf9b.workers.dev";
// 简易演示：固定取测试订单，正式可加用户登录存储
async function loadAllOrders(){
  const res = await fetch(`${API_BASE}/api/admin/list?pwd=Rene123456`);
  const list = await res.json();
  const wrap = document.getElementById("orderList");
  if(list.length === 0){
    wrap.innerHTML = "<p>暂无订单</p>";
    return;
  }
  list.forEach(item=>{
    let statusText = "";
    let statusClass = "";
    if(item.status === "unpaid"){statusText="未付款";statusClass="status-unpaid"}
    if(item.status === "checking"){statusText="待商家核验";statusClass="status-checking"}
    if(item.status === "paid"){statusText="已确认收款";statusClass="status-paid"}
    if(item.status === "reject"){statusText="订单驳回";statusClass="status-reject"}
    wrap.innerHTML += `
      <div class="order-card">
        <p>订单号：${item.order_no}</p>
        <p>演出：${item.event_name}</p>
        <p>金额：HK$${item.price}</p>
        <p>状态：<span class="${statusClass}">${statusText}</span></p>
      </div>
    `
  })
}
loadAllOrders();
</script>
</body>
</html>
