<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Clerk登录SDK -->
<script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"></script>
<title>支付凭证上传 | Re旅行</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f7f8fa;padding-bottom:70px}
nav{background:#0a0e17;padding:14px 16px}
nav a{color:#fff;text-decoration:none}
.container{max-width:520px;margin:30px auto;padding:0 14px;text-align:center}
.qr-card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0.05);margin-bottom:24px}
.tip-red{color:#ef4444;margin:10px 0;font-size:14px}
.upload-box{border:2px dashed #6366f1;border-radius:12px;padding:36px 16px;margin:20px 0;color:#6366f1;cursor:pointer}
.preview{max-width:100%;max-height:220px;border-radius:10px;margin:10px 0;display:none}
.tip-text{margin:8px 0;font-size:14px}
.btn-sub{width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;color:#fff;border-radius:10px;font-size:16px;cursor:pointer}
/* 底部导航统一样式 */
.bottom-tab{position:fixed;bottom:0;left:0;width:100%;background:#fff;display:flex;border-top:1px solid #eee;z-index:999}
.tab-cell{flex:1;text-align:center;padding:10px 0;cursor:pointer}
.tab-cell p{font-size:12px;color:#777;margin-top:3px;pointer-events:none}
.tab-cell.active p{color:#111;font-weight:500}
</style>
</head>
<body>
<nav><a href="javascript:history.back()">← 返回</a></nav>
<div class="container">
  <h3>订单号：<span id="orderNo"></span></h3>
  <div class="qr-card">
    <p>请使用 AlipayHK / 支付宝转账</p>
    <p class="tip-red">转账备注填写订单号，方便后台核对</p>
    <img src="这里替换你的收款码图片链接" width="240" alt="收款二维码">
  </div>

  <!-- 相册选图区域，手机点击直接打开相册 -->
  <div class="upload-box" onclick="document.getElementById('fileInput').click()">
    <p>点击此处，从手机相册选择转账截图</p>
  </div>
  <input type="file" id="fileInput" accept="image/*" style="display:none">
  <img class="preview" id="previewImg">
  <p class="tip-text" id="tipText"></p>

  <button class="btn-sub" onclick="submitPay()">提交付款凭证</button>
</div>

<!-- 全站统一底部导航 -->
<div class="bottom-tab">
  <div class="tab-cell" onclick="location.href='/'"><p>首页</p></div>
  <div class="tab-cell" onclick="location.href='/message.html'"><p>讯息</p></div>
  <div class="tab-cell" onclick="location.href='/admin-add-event.html'"><p>发布</p></div>
  <div class="tab-cell" onclick="location.href='/mine.html'"><p>我的行程</p></div>
  <div class="tab-cell" onclick="location.href='/account.html'"><p>账户</p></div>
</div>

<script>
const API_BASE = "https://hidden-mouse-2636.bmk4byvf9b.workers.dev";
// ImgBB公共免费密钥，香港访问稳定，替代telegra.ph
const IMGBB_KEY = "6d207e02198a847aa98d0a2a901485a5";
const CLERK_PUB_KEY = "pk_test_dG9wLWFudC0xLmNsZXJrLmFjY291bnRzLmRldiQ";
const clerk = new Clerk(CLERK_PUB_KEY);

const urlParams = new URLSearchParams(location.search);
const orderNo = urlParams.get("orderNo");
let orderTotalPrice = urlParams.get("total") || "0";
let finalImgUrl = "";
const fileInput = document.getElementById("fileInput");
const previewImg = document.getElementById("previewImg");
const tipText = document.getElementById("tipText");

// 页面初始化：登录校验
window.onload = async function(){
  await clerk.load();
  const user = clerk.user;
  if(!user){
    alert("请先登录账号再上传付款凭证");
    location.href="/";
    return;
  }
  document.getElementById("orderNo").innerText = orderNo;
}

// 相册选图上传逻辑（改用ImgBB，境外线路更稳定）
fileInput.onchange = async function(e){
  const file = e.target.files[0];
  if(!file) return;
  tipText.innerText = "正在上传图片...";
  const formData = new FormData();
  formData.append("image", file);
  formData.append("key", IMGBB_KEY);
  try{
    const res = await fetch("https://api.imgbb.com/upload", {
      method: "POST",
      body: formData
    });
    const json = await res.json();
    finalImgUrl = json.data.image.url;
    previewImg.src = finalImgUrl;
    previewImg.style.display = "block";
    tipText.innerText = "图片上传完成，可提交凭证";
  }catch(err){
    tipText.innerText = "上传失败，请切换5G网络重试";
    console.error(err);
  }
}

// 提交付款凭证主函数（修复重复函数、消费更新内嵌）
async function submitPay(){
  // 上传凭证到后台
  const res = await fetch(`${API_BASE}/api/upload-pay`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({orderNo,imgUrl:finalImgUrl || ""})
  });
  const data = await res.json();
  if(data.success){
    // 凭证提交成功，更新用户累计消费（传递Clerk用户ID替代旧phone）
    const user = clerk.user;
    await fetch(`${API_BASE}/api/user/addspend`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        clerkUserId: user.id,
        money: orderTotalPrice
      })
    });
    alert("凭证提交成功，等待商家核验！");
    location.href="/mine.html";
  }else{
    alert("提交失败，请重试");
  }
}
</script>
</body>
</html>
