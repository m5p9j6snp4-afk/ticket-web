<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>付款</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
header{background:#111;color:#fff;padding:16px}
header a{color:#fff;text-decoration:none}
.container{max-width:500px;margin:30px auto;padding:0 16px;text-align:center}
.qr-box{border:1px solid #eee;padding:20px;border-radius:10px;margin:20px 0}
.tip{color:#f00;margin:10px 0}
.upload-area{border:2px dashed #007aff;padding:30px;border-radius:8px;margin:15px 0}
.btn{background:#007aff;color:#fff;border:none;padding:12px;width:100%;border-radius:6px;font-size:16px}
.preview{max-width:100%;max-height:200px;margin:10px 0;display:none}
</style>
</head>
<body>
<header>
  <a href="/">返回首页</a>
</header>
<div class="container">
  <h3>订单号：<span id="orderNo"></span></h3>
  <div class="qr-box">
    <p>请使用 AlipayHK / 内地支付宝扫码转账</p>
    <p class="tip">转账备注填写上方订单号，方便核对</p>
    <img src="这里填你的支付宝收款二维码链接" width="220" alt="收款码">
  </div>

  <!-- 相册选择图片组件，手机点这里直接打开相册 -->
  <div class="upload-area">
    <input type="file" id="fileInput" accept="image/*" style="display:none">
    <p onclick="document.getElementById('fileInput').click()">点击此处，从相册选择转账截图</p>
  </div>
  <img id="previewImg" class="preview" alt="截图预览">
  <p id="tipText"></p>

  <button class="btn" onclick="submitPay()">提交付款凭证</button>
</div>
<script>
const API_BASE = "https://hidden-mouse-2636.bmk4byvf9b.workers.dev";
const urlParams = new URLSearchParams(location.search);
const orderNo = urlParams.get("orderNo");
document.getElementById("orderNo").innerText = orderNo;

let finalImgUrl = "";
const fileInput = document.getElementById("fileInput");
const previewImg = document.getElementById("previewImg");
const tipText = document.getElementById("tipText");

// 监听相册选图
fileInput.onchange = async function(e){
  const file = e.target.files[0];
  if(!file) return;
  tipText.innerText = "正在上传图片...";
  // 临时方案：免费 Telegraph 图床，无需自己搭建存储
  const formData = new FormData();
  formData.append("file", file);
  try{
    const res = await fetch("https://telegra.ph/upload", {
      method: "POST",
      body: formData
    });
    const json = await res.json();
    finalImgUrl = "https://telegra.ph" + json[0].src;
    previewImg.src = finalImgUrl;
    previewImg.style.display = "block";
    tipText.innerText = "图片上传完成，可以提交订单";
  }catch(err){
    tipText.innerText = "上传失败，请重新选择图片";
  }
}

async function submitPay(){
  if(!finalImgUrl){
    alert("请先从相册选择转账截图");
    return;
  }
  const res = await fetch(`${API_BASE}/api/upload-pay`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({orderNo,imgUrl:finalImgUrl})
  });
  const data = await res.json();
  if(data.success){
    alert("提交成功，等待商家确认收款！");
    location.href = "/mine.html";
  }
}
</script>
</body>
</html>
