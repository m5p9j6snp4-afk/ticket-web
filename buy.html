<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>购票下单</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
header{background:#111;color:#fff;padding:16px;display:flex;gap:24px}
header a{color:#fff;text-decoration:none}
.container{max-width:600px;margin:30px auto;padding:0 16px}
.form-item{margin:16px 0}
label{display:block;margin-bottom:6px;font-weight:500}
input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px}
.btn{background:#007aff;color:#fff;border:none;padding:12px;width:100%;border-radius:6px;font-size:16px;cursor:pointer}
.info-box{background:#f5f5f5;padding:14px;border-radius:8px;margin-bottom:20px}
</style>
</head>
<body>
<header>
  <a href="/">返回首页</a>
</header>
<div class="container">
  <div class="info-box">
    <h3 id="eventName"></h3>
    <p>票价：HK$<span id="eventPrice"></span></p>
  </div>
  <div class="form-item">
    <label>观演人姓名</label>
    <input type="text" id="username" placeholder="填写真实姓名">
  </div>
  <div class="form-item">
    <label>联系电话</label>
    <input type="text" id="contact" placeholder="香港/内地手机号">
  </div>
  <button class="btn" onclick="submitOrder()">提交订单</button>
</div>
<script>
const API_BASE = "https://hidden-mouse-2636.bmk4byvf9b.workers.dev";
const urlParams = new URLSearchParams(location.search);
const eventId = urlParams.get("id");
let eventData = {};

async function loadEvent(){
  const allRes = await fetch(`${API_BASE}/api/events`);
  const allEvents = await allRes.json();
  eventData = allEvents.find(item=>item.id == eventId);
  if(!eventData) {
    alert("演出不存在");
    return location.href="/";
  }
  document.getElementById("eventName").innerText = eventData.name;
  document.getElementById("eventPrice").innerText = eventData.price;
}

async function submitOrder(){
  const username = document.getElementById("username").value.trim();
  const contact = document.getElementById("contact").value.trim();
  if(!username || !contact){
    alert("请填写姓名和电话");
    return;
  }
  const res = await fetch(`${API_BASE}/api/create-order`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      eventName:eventData.name,
      price:eventData.price,
      username,
      contact
    })
  });
  const data = await res.json();
  if(data.success){
    location.href = `/pay.html?orderNo=${data.orderNo}`;
  }else{
    alert("创建订单失败");
  }
}
loadEvent();
</script>
</body>
</html>
