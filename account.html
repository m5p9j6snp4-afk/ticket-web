<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的账户 | Re旅行</title>
<!-- Clerk 登录SDK -->
<script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif}
body{background:#f8f9fa;padding-bottom:70px}
.back{padding:16px 20px}
.back a{color:#111;text-decoration:none}
.user-card{background:#121212;color:#fff;margin:0 20px;border-radius:16px;padding:24px}
.level{font-size:16px;margin:8px 0;color:#d4af37}
.spend{opacity:0.8;font-size:14px}
.list{margin:20px}
.item{background:#fff;padding:16px 20px;border-radius:12px;margin-bottom:10px;display:flex;justify-content:space-between;cursor:pointer}
.logout{margin:30px 20px}
.logout button{width:100%;padding:14px;border:1px solid #f00;color:#f00;background:#fff;border-radius:12px;font-size:15px;cursor:pointer}
.bottom-tab{position:fixed;bottom:0;left:0;width:100%;background:#fff;display:flex;border-top:1px solid #eee;z-index:999}
.tab{flex:1;text-align:center;padding:10px 0;cursor:pointer}
.tab p{font-size:12px;color:#777;margin-top:3px;pointer-events:none}
.tab.active p{color:#111;font-weight:500}
</style>
</head>
<body>
<div class="back"><a href="/">← 返回首页</a></div>
<div class="user-card">
  <h2 id="userName">加载中</h2>
  <div class="level">会员等级：<span id="userLevel"></span></div>
  <div class="spend">累计消费美金：$<span id="userSpend">0</span></div>
</div>
<div class="list">
  <div class="item">邮箱 <span id="userEmail">未填写</span></div>
  <div class="item" onclick="showChangePwd()">修改登录密码</div>
  <div class="item" onclick="location.href='/mine.html'">我的全部行程订单</div>
</div>
<div class="logout"><button onclick="logout()">退出登录</button></div>

<div class="bottom-tab">
  <div class="tab" onclick="location.href='/'"><p>首页</p></div>
  <div class="tab" onclick="location.href='/message.html'"><p>讯息</p></div>
  <div class="tab" onclick="location.href='/admin-add-event.html'"><p>发布</p></div>
  <div class="tab" onclick="location.href='/mine.html'"><p>我的行程</p></div>
  <div class="tab active"><p>账户</p></div>
</div>

<script>
const API_BASE = "https://hidden-mouse-2636.bmk4byvf9b.workers.dev";
const CLERK_PUB_KEY = "pk_test_dG9wLWFudC0xLmNsZXJrLmFjY291bnRzLmRldiQ";
const clerk = new Clerk(CLERK_PUB_KEY);
let userData = null;

window.onload = async function(){
  // 初始化 Clerk
  await clerk.load();
  const user = clerk.user;
  // 未登录拦截，跳转首页弹出登录
  if(!user){
    location.href="/";
    return;
  }
  userData = user;
  // 填充用户信息
  document.getElementById("userName").innerText = user.username || user.emailAddresses[0]?.emailAddress;
  document.getElementById("userEmail").innerText = user.emailAddresses[0]?.emailAddress || "未填写";
  // 读取会员等级、累计消费（存在用户公开元数据）
  const meta = user.publicMetadata || {};
  document.getElementById("userLevel").innerText = meta.member_level || "银级会员";
  document.getElementById("userSpend").innerText = meta.total_spend || "0";
}

// Clerk 原生退出登录
async function logout(){
  await clerk.signOut();
  alert("已退出登录");
  location.href="/";
}

// 修改密码：调用 Clerk 官方改密弹窗，弃用旧接口
function showChangePwd(){
  clerk.openUserProfile({page: "security"});
}
</script>
</body>
</html>
