<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script 
  async 
  crossorigin="anonymous" 
  data-clerk-publishable-key="pk_test_dG9wLWFudC0xLmNsZXJrLmFjY291bnRzLmRldiQ" 
  src="https://top-ant-1.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js" 
  type="text/javascript">
</script>
<title>账户 | Re旅行</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f7f8fa;padding-bottom:70px}
.back{padding:16px 20px}
.back a{text-decoration:none;color:#111;font-size:16px}
.load-box{margin:20px;border-radius:16px;background:#111;color:#fff;padding:30px 20px}
.load-box h3{font-size:24px;margin-bottom:12px}
.load-box p{font-size:15px;color:#ccc;margin:6px 0}
.item-box{background:#fff;margin:12px 20px;border-radius:12px;padding:18px;display:flex;justify-content:space-between;align-items:center}
.item-box p:first-child{font-size:15px;color:#222}
.item-box p:last-child{color:#888}
.logout-btn{margin:30px 20px;padding:16px;width:calc(100% - 40px);border:2px solid #ff3b30;color:#ff3b30;background:#fff;border-radius:12px;font-size:16px;cursor:pointer}
/* 底部导航统一 */
.bottom-tab{position:fixed;bottom:0;left:0;width:100%;background:#fff;display:flex;border-top:1px solid #eee;z-index:999}
.tab-cell{flex:1;text-align:center;padding:10px 0;cursor:pointer}
.tab-cell p{font-size:12px;color:#777;margin-top:3px;pointer-events:none}
.tab-cell.active p{color:#111;font-weight:500}
</style>
</head>
<body>
<div class="back"><a href="/">← 返回首页</a></div>

<div class="load-box" id="loadWrap">
  <h3 id="loadingTitle">加载中...</h3>
  <div id="metaDetails" style="display:none">
    <p>会员等级：<span id="levelText"></span></p>
    <p>累计消费美金：$<span id="spendText"></span></p>
  </div>
</div>

<div id="infoWrap" style="display:none">
  <div class="item-box">
    <p>邮箱</p>
    <p id="userEmail">未填写</p>
  </div>
  <div class="item-box">
    <p>修改登录密码</p>
    <p>点击跳转</p>
  </div>
  <div class="item-box">
    <p>我的全部行程订单</p>
    <p>点击查看</p>
  </div>
  <button class="logout-btn" id="logoutBtn">退出登录</button>
</div>

<div class="bottom-tab">
  <div class="tab-cell" onclick="location.href='/'"><p>首页</p></div>
  <div class="tab-cell" onclick="location.href='/message.html'"><p>讯息</p></div>
  <div class="tab-cell" onclick="location.href='/admin-add-event.html'"><p>发布</p></div>
  <div class="tab-cell" onclick="location.href='/mine.html'"><p>我的行程</p></div>
  <div class="tab-cell active"><p>账户</p></div>
</div>

<script>
window.addEventListener("load", async function() {
  try {
    // 核心更改：显式在 JavaScript 阶段手工注入翻译映射，强制覆盖英文
    await Clerk.load({
      localization: {
        signIn: {
          start: {
            title: "登录 Re旅行",
            subtitle: "使用您的社交账号继续",
            actionText: "没有账号？",
            actionLink: "现在注册"
          }
        },
        signUp: {
          start: {
            title: "创建新账户",
            subtitle: "加入 Re旅行 开始您的行程",
            actionText: "已有账号？",
            actionLink: "立即登录"
          }
        },
        socialButtonsBlockButton: "使用 {{provider|titleize}} 登录"
      }
    });

    const loadWrap = document.getElementById("loadWrap");
    const infoWrap = document.getElementById("infoWrap");

    // 检查登录状态
    if (!Clerk.user) {
      // 未登录直接弹出带有我们中文配置的登录弹窗
      Clerk.openSignIn({
        afterSignInUrl: window.location.href, 
        afterSignUpUrl: window.location.href
      });
      document.getElementById("loadingTitle").innerText = "请先登录账户";
      return;
    }

    // 已登录：读取并填充用户数据
    const user = Clerk.user;
    const level = user.publicMetadata?.member_level || "银级会员";
    const spend = user.publicMetadata?.total_spend || 0;
    const email = user.emailAddresses[0]?.emailAddress || "未填写";

    // 更新 DOM 渲染
    document.getElementById("loadingTitle").innerText = "欢迎回来！";
    document.getElementById("levelText").innerText = level;
    document.getElementById("spendText").innerText = spend;
    document.getElementById("userEmail").innerText = email;
    
    // 显示对应的资料区域
    document.getElementById("metaDetails").style.display = "block";
    infoWrap.style.display = "block";

    // 退出登录逻辑
    document.getElementById("logoutBtn").onclick = async () => {
      await Clerk.signOut();
      window.location.href = "/"; 
    }

  } catch (error) {
    console.error("Clerk 初始化失败:", error);
    document.getElementById("loadingTitle").innerText = "同步账户信息失败，请刷新重试";
  }
});
</script>
</body>
</html>
