<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"></script>
<title>我的帳戶 | Re旅行</title>
<style>
    body{font-family:system-ui;padding:20px;background:#f7f8fa}
    .card{background:#fff;padding:20px;border-radius:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1);text-align:center}
    .btn{display:block;width:100%;padding:15px;margin-top:20px;border-radius:10px;border:none;background:#0f172a;color:#fff;font-weight:bold;cursor:pointer}
</style>
</head>
<body>

<div class="card" id="accountBox">
    <h2 id="statusTitle">檢測帳戶狀態...</h2>
    <div id="actionArea"></div>
</div>

<script>
const CLERK_PUB_KEY = "pk_test_dG9wLWFudC0xLmNsZXJrLmFjY291bnRzLmRldiQ";
const clerk = new Clerk(CLERK_PUB_KEY);

async function checkAccount() {
    await clerk.load();
    const statusTitle = document.getElementById("statusTitle");
    const actionArea = document.getElementById("actionArea");

    if (clerk.user) {
        statusTitle.innerText = "您已登入";
        actionArea.innerHTML = `
            <p>郵箱: ${clerk.user.emailAddresses[0].emailAddress}</p>
            <button class="btn" onclick="clerk.signOut().then(() => location.reload())">登出帳號</button>
        `;
    } else {
        statusTitle.innerText = "您尚未登入";
        // 🚨 這是最關鍵的修改：強制連結導航，不再使用 JS 彈窗
        actionArea.innerHTML = `
            <a href="https://clerk.accounts.dev/sign-in" style="text-decoration:none">
                <button class="btn">前往登入頁面</button>
            </a>
        `;
    }
}

window.onload = checkAccount;
</script>
</body>
</html>
