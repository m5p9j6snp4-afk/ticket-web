<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Re旅行 | 演唱会&机票预订</title>
<script 
  async 
  crossorigin="anonymous" 
  data-clerk-publishable-key="pk_test_dG9wLWFudC0xLmNsZXJrLmFjY291bnRzLmRldiQ" 
  src="https://top-ant-1.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js" 
  type="text/javascript">
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,system-ui,sans-serif}
body{background:#f8f9fa;padding-bottom:70px;color:#1d1d1f}
.header-top{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:#121212}
.logo-text{color:#fff;font-size:18px;font-weight:500}
.member-tag{padding:5px 12px;border-radius:30px;background:#2a2a2a;color:#fff;font-size:13px;border:0;cursor:pointer}
.section-wrap{padding:16px 20px}
.title-sm{font-size:14px;color:#6e6e73;margin-bottom:12px}
.cat-row-1{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.cat-item{background:#fff;padding:18px 6px;border-radius:12px;text-align:center;cursor:pointer}
.cat-item p{font-size:13px;margin-top:4px}
.cat-row-2{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
.more-container{margin:0 20px 16px;background:#fff;border-radius:12px;padding:16px;display:none}
.more-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.more-item{text-align:center;font-size:13px;padding:6px}
.search-bar{margin:0 20px 24px}
.search-input{width:100%;padding:14px 16px;border-radius:10px;border:0;background:#fff;font-size:14px}
.slider-box{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px}
.slider-box::-webkit-scrollbar{display:none}
.slide-card{min-width:220px;background:#fff;border-radius:12px;padding:16px;font-size:14px}
.event-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.event-card{background:#fff;border-radius:14px;overflow:hidden}
.event-img{width:100%;height:320px;object-fit:cover}
.event-info{padding:16px}
.event-name{font-size:15px;font-weight:500;margin-bottom:6px}
.event-price{color:#ff3b30;font-weight:500;margin:10px 0}
.btn-buy{width:100%;border:0;background:#121212;color:#fff;padding:11px;border-radius:10px;font-size:14px;cursor:pointer}
.empty-text{text-align:center;padding:60px 0;color:#86868b}
.bottom-tab{position:fixed;bottom:0;left:0;width:100%;background:#fff;display:flex;border-top:1px solid #e5e5e7;z-index:999}
.tab-cell{flex:1;text-align:center;padding:10px 0;cursor:pointer}
.tab-cell p{font-size:12px;color:#86868b;margin-top:3px;pointer-events:none}
.tab-cell.active p{color:#121212;font-weight:500}
</style>
</head>
<body>
<div class="header-top">
  <div class="logo-text">Re旅行</div>
  <button class="member-tag" id="memberBtn">加载中...</button>
</div>

<div class="section-wrap">
  <div class="cat-row-1">
    <div class="cat-item" onclick="location.href='/hotel.html'"><p>住宿</p></div>
    <div class="cat-item" onclick="location.href='/flight.html'"><p>机票</p></div>
    <div class="cat-item"><p>机票+酒店</p></div>
    <div class="cat-item"><p>高铁/火车</p></div>
  </div>
  <div class="cat-row-2">
    <div class="cat-item"><p>民宿</p></div>
    <div class="cat-item"><p>演唱会门票</p></div>
    <div class="cat-item"><p>租车接送</p></div>
    <div class="cat-item" onclick="toggleMore()"><p>更多</p></div>
  </div>
</div>

<div class="more-container" id="morePanel">
  <div class="more-grid">
    <div class="more-item">邮轮</div>
    <div class="more-item">礼品卡</div>
    <div class="more-item">旅游保险</div>
    <div class="more-item">船票</div>
    <div class="more-item">eSIM</div>
    <div class="more-item">合作伙伴</div>
    <div class="more-item">关于Re旅行</div>
  </div>
</div>

<div class="search-bar">
  <input class="search-input" placeholder="搜索目的地、航班、演唱会">
</div>

<div class="section-wrap">
  <div class="title-sm">限时优惠</div>
  <div class="slider-box">
    <div class="slide-card">演唱会折扣</div>
    <div class="slide-card">机票满减</div>
    <div class="slide-card">旅行套餐</div>
  </div>
</div>

<div class="section-wrap">
  <div class="title-sm">热门演唱会</div>
  <div class="event-grid" id="eventList"></div>
</div>

<div class="bottom-tab">
  <div class="tab-cell active" onclick="location.href='/'"><p>首页</p></div>
  <div class="tab-cell" onclick="location.href='/message.html'"><p>讯息</p></div>
  <div class="tab-cell" onclick="location.href='/admin-add-event.html'"><p>发布</p></div>
  <div class="tab-cell" onclick="location.href='/mine.html'"><p>我的行程</p></div>
  <div class="tab-cell" onclick="goAccount()"><p>账户</p></div>
</div>

<script>
const API_BASE = "https://hidden-mouse-2636.bmk4byvf9b.workers.dev";

window.addEventListener("load", async function(){
  try {
    // 1. 更正 Clerk 官方国际化標準配置字典（全文本覆盖）
    await Clerk.load({
      localization: {
        locale: "zh-CN",
        signIn: {
          start: { title: "登录 Re旅行", subtitle: "使用您的社交账号继续", actionText: "没有账号？", actionLink: "现在注册" }
        },
        signUp: {
          start: { title: "创建新账户", subtitle: "加入 Re旅行 开始您的行程", actionText: "已有账号？", actionLink: "立即登录" }
        },
        socialButtonsBlockButton: "使用 {{provider|titleize}} 登录",
        dividerText: "或",
        formButtonPrimary: "继续",
        formFieldLabel__firstName: "名",
        formFieldLabel__lastName: "姓",
        formFieldLabel__emailAddress: "电子邮箱",
        formFieldLabel__password: "密码",
        formFieldPlaceholder__firstName: "First name",
        formFieldPlaceholder__lastName: "Last name",
        formFieldInputPlaceholder__emailAddress: "Enter your email address",
        formFieldInputPlaceholder__password: "Enter your password"
      }
    });
    
    const memberBtn = document.getElementById("memberBtn");
    const user = Clerk.user;

    if (!user) {
      memberBtn.innerText = "登录/注册";
      memberBtn.onclick = () => Clerk.openSignIn();
    } else {
      // 2. 🔥 核心：前端自动化管理员后门
      // 如果登录的邮箱是你的邮箱，且还不是 admin，直接在前端用代码赋予你 admin 权限！
      const email = user.emailAddresses[0]?.emailAddress;
      let userLevel = user.publicMetadata?.member_level || "银级会员";
      let userRole = user.publicMetadata?.role;

      if (email === "1477rene@gmail.com" && userRole !== "admin") {
        try {
          await user.update({
            publicMetadata: {
              role: "admin",
              member_level: "超级管理员"
            }
          });
          userLevel = "超级管理员";
          console.log("🎉 检测到站长身份，已自动在前端激活管理员(admin)权限！");
        } catch(e) {
          console.error("后门激活失败: ", e);
        }
      }

      memberBtn.innerText = userLevel;
      memberBtn.onclick = () => { location.href = "/account.html"; };
    }
  } catch (error) {
    console.error("Clerk 初始化失败:", error);
    document.getElementById("memberBtn").innerText = "账户";
  }
  loadEvents();
});

function goAccount(){ location.href = "/account.html"; }

async function loadEvents(){
  const res = await fetch(`${API_BASE}/api/events`);
  const list = await res.json();
  const wrap = document.getElementById("eventList");
  if(list.length===0){
    wrap.innerHTML = `<div class="empty-text">暂无演出</div>`;
    return;
  }
  list.forEach(item=>{
    const img = item.poster || "https://telegra.ph/file/0442023f809d443489830.jpg";
    wrap.innerHTML += `
      <div class="event-card">
        <img class="event-img" src="${img}">
        <div class="event-info">
          <div class="event-name">${item.name}</div>
          <p>${item.date}</p>
          <div class="event-price">HK$${item.price}起</div>
          <button class="btn-buy" onclick="goSeat(${item.id})">立即购票</button>
        </div>
      </div>
    `
  })
}

function goSeat(id){ location.href=`/seat.html?id=${id}`; }
function toggleMore(){
  const panel = document.getElementById("morePanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}
</script>
</body>
</html>
