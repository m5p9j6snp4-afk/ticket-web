<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"></script>
<title>Re旅行 | 首頁</title>
<style>
/* 樣式簡化以確保加載速度 */
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f7f8fa;padding-bottom:80px}
header{background:#1e293b;padding:24px 16px;color:#fff;border-bottom-left-radius:20px;border-bottom-right-radius:20px}
.btn-login{background:#fff;color:#0f172a;border:none;padding:12px 24px;border-radius:20px;font-weight:bold;cursor:pointer}
.container{padding:20px}
</style>
</head>
<body>

<header>
    <h2 id="welcomeGreeting">載入中...</h2>
    <div id="authArea" style="margin-top:15px"></div>
</header>

<div class="container" id="eventList">正在載入演唱會...</div>

<script>
const CLERK_PUB_KEY = "pk_test_dG9wLWFudC0xLmNsZXJrLmFjY291bnRzLmRldiQ";
const clerk = new Clerk(CLERK_PUB_KEY);

window.onload = async () => {
    await clerk.load({ localization: { locale: "zh-HK" } });
    
    // 檢查登入狀態
    if (clerk.user) {
        const email = clerk.user.emailAddresses[0].emailAddress;
        document.getElementById("welcomeGreeting").innerText = 
            (email === "1477rene@gmail.com") ? "下午好，管理員 Rene" : "歡迎回來";
        document.getElementById("authArea").innerHTML = 
            `<button class="btn-login" onclick="clerk.signOut().then(() => location.reload())">登出</button>`;
    } else {
        document.getElementById("welcomeGreeting").innerText = "你好，歡迎來到 Re旅行";
        // 核心改動：直接跳轉登入，不使用彈出視窗
        document.getElementById("authArea").innerHTML = 
            `<button class="btn-login" onclick="window.location.href='https://accounts.dev/sign-in?redirect_url=' + encodeURIComponent(window.location.href)">前往登入頁</button>`;
    }

    // 載入列表
    fetch("https://hidden-mouse-2636.bmk4byvf9b.workers.dev/api/events")
        .then(r => r.json())
        .then(data => {
            document.getElementById("eventList").innerHTML = data.map(i => `<div>${i.name}</div>`).join('');
        });
};
</script>
</body>
</html>
