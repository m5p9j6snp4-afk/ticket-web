<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"></script>
<title>Re旅行 | 演唱會與機票預訂首頁</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f7f8fa;padding-bottom:80px;color:#333}
header{background:linear-gradient(135deg,#0a0e17,#1e293b);padding:24px 16px;color:#fff;border-bottom-left-radius:20px;border-bottom-right-radius:20px;position:relative;z-index:10}
.user-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;position:relative;z-index:20}
.user-info{flex:1;padding-right:10px}
.user-info h2{font-size:20px;font-weight:600}
.user-info p{font-size:13px;color:#94a3b8;margin-top:2px}
.auth-box{position:relative;z-index:9999 !important}
.btn-login{background:#fff;color:#0f172a;border:none;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,0.15)}
.btn-logout{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer}
.dashboard-card{background:rgba(255,255,255,0.08);backdrop-filter:blur(10px);border-radius:14px;padding:16px;display:flex;justify-content:space-between;margin-top:10px}
.db-item text{display:block;font-size:12px;color:#94a3b8}
.db-item number{display:block;font-size:18px;font-weight:bold;color:#fff;margin-top:4px}
.container{max-width:620px;margin:24px auto;padding:0 14px;position:relative;z-index:1}
.section-title{font-size:18px;font-weight:600;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.btn-admin-gate{font-size:13px;color:#4f46e5;text-decoration:none;font-weight:500}
.event-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.03);margin-bottom:20px;display:flex;flex-direction:column}
.event-banner{width:100%;height:200px;object-fit:cover;background:#e2e8f0}
.event-body{padding:16px}
.event-name{font-size:17px;font-weight:600;color:#1e293b;margin-bottom:6px}
.event-date{font-size:13px;color:#64748b;margin-bottom:12px}
.zones-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.zone-tag{background:#f1f5f9;color:#334155;font-size:12px;padding:4px 8px;border-radius:6px;font-weight:500}
.event-footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid #f1f5f9;padding-top:12px}
.price-from{font-size:13px;color:#64748b}
.price-from span{font-size:20px;font-weight:bold;color:#ef4444}
.btn-book{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;padding:9px 18px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer}
.bottom-tab{position:fixed;bottom:0;left:0;width:100%;background:#fff;display:flex;border-top:1px solid #e2e8f0;z-index:999}
.tab-cell{flex:1;text-align:center;padding:12px 0;cursor:pointer}
.tab-cell p{font-size:12px;color:#64748b;margin-top:4px;pointer-events:none}
.tab-cell.active p{color:#0f172a;font-weight:600}
</style>
</head>
<body>

<header>
  <div class="user-bar">
    <div class="user-info">
      <h2 id="welcomeGreeting">你好，歡迎來到 Re旅行</h2>
      <p id="userEmailSub">登入解鎖個人专享行程</p>
    </div>
    <div class="auth-box" id="authBtnWrap">
      <button class="btn-login" id="clerkTriggerBtn">登入 / 註冊</button>
    </div>
  </div>

  <div class="dashboard-card" id="userSpendDashboard">
    <div class="db-item"><text>累計消費額</text><number>HK$ 0.00</number></div>
    <div class="db-item"><text>進行中行程</text><number>0 個</number></div>
    <div class="db-item"><text>會員積分</text><number>0 P</number></div>
  </div>
</header>

<div class="container">
  <div class="section-title">
    <span>熱門演唱會預訂</span>
    <a href="/admin.html" class="btn-admin-gate" id="adminGateBtn" style="display:none">進入商家後台 →</a>
  </div>
  <div id="eventListContainer">
    <p style="text-align:center;color:#94a3b8;padding:40px 0;">正在載入最新演唱會...</p>
  </div>
</div>

<div class="bottom-tab">
  <div class="tab-cell active"><p>首頁</p></div>
  <div class="tab-cell" onclick="location.href='/message.html'"><p>訊息</p></div>
  <div class="tab-cell" onclick="location.href='/admin-add-event.html'"><p>發布</p></div>
  <div class="tab-cell" onclick="location.href='/mine.html'"><p>我的行程</p></div>
  <div class="tab-cell" onclick="location.href='/account.html'"><p>帳戶</p></div>
</div>

<script>
const API_BASE = "https://hidden-mouse-2636.bmk4byvf9b.workers.dev";
const CLERK_PUB_KEY = "pk_test_dG9wLWFudC0xLmNsZXJrLmFjY291bnRzLmRldiQ";
const clerk = new Clerk(CLERK_PUB_KEY);

function getTimeGreeting() {
  const hr = new Date().getHours();
  if (hr >= 5 && hr < 12) return "早上好";
  if (hr >= 12 && hr < 18) return "下午好";
  return "晚上好";
}

// 🌟 新增：狀態渲染器
function renderUI(user) {
  if (user) {
    const email = user.emailAddresses[0]?.emailAddress;
    const meta = user.publicMetadata || {};
    
    document.getElementById("authBtnWrap").innerHTML = `<button class="btn-logout" onclick="clerk.signOut().then(() => location.href='/')">登出</button>`;
    document.getElementById("userEmailSub").innerText = email;

    if (email === "1477rene@gmail.com" || meta.role === "admin") {
      document.getElementById("welcomeGreeting").innerText = `${getTimeGreeting()}，管理員 Rene`;
      document.getElementById("userSpendDashboard").style.display = "none";
      document.getElementById("adminGateBtn").style.display = "block";
    } else {
      document.getElementById("welcomeGreeting").innerText = `${getTimeGreeting()}，${user.firstName || '旅客'}`;
    }
  } else {
    document.getElementById("welcomeGreeting").innerText = "你好，歡迎來到 Re旅行";
    document.getElementById("userSpendDashboard").style.display = "flex";
  }
}

window.onload = async function() {
  await clerk.load({ localization: { locale: "zh-CN" } });
  
  // 🌟 核心保險：監聽 Clerk 狀態改變，一旦登入成功立即強制重繪介面
  clerk.addListener(({ user }) => {
    renderUI(user);
  });

  document.getElementById("clerkTriggerBtn").addEventListener("click", () => {
    clerk.openSignIn({
      afterSignInUrl: window.location.origin,
      afterSignUpUrl: window.location.origin
    });
  });

  renderUI(clerk.user);
  loadEvents();
}

async function loadEvents() {
  try {
    const res = await fetch(`${API_BASE}/api/events`);
    const events = await res.json();
    const container = document.getElementById("eventListContainer");
    container.innerHTML = "";

    if (!events || events.length === 0) {
      container.innerHTML = `<p style="text-align:center;color:#94a3b8;padding:40px 0;">暫無發布的演唱會資訊</p>`;
      return;
    }

    events.forEach(item => {
      let zonesHtml = "";
      if (item.zones && Array.isArray(item.zones)) {
        item.zones.forEach(z => {
          zonesHtml += `<span class="zone-tag">${z.name} (HK$${z.price})</span>`;
        });
      } else {
        zonesHtml = `<span class="zone-tag">常規單一分區</span>`;
      }

      container.innerHTML += `
        <div class="event-card">
          ${item.poster ? `<img class="event-banner" src="${item.poster}" alt="海報">` : `<div class="event-banner" style="display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:14px;">暫無海報</div>`}
          <div class="event-body">
            <div class="event-name">${item.name || "未命名演出"}</div>
            <div class="event-date">演出日期：${item.date || "未定"}</div>
            <div class="zones-wrap">${zonesHtml}</div>
            <div class="event-footer">
              <div class="price-from">票價 <span>HK$ ${item.price || "780"}</span> 起</div>
              <button class="btn-book" onclick="location.href='/book.html?id=${item.id}'">立即預訂</button>
            </div>
          </div>
        </div>
      `;
    });
  } catch (err) {
    document.getElementById("eventListContainer").innerHTML = `<p style="text-align:center;color:#ef4444;padding:40px 0;">數據載入失敗</p>`;
  }
}
</script>
</body>
</html>
