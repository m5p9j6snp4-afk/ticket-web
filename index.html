<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- 禁用页面缓存，解决Cloudflare Pages缓存干扰 -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"></script>
<title>Re旅行 | 演唱會預訂</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
    body{background:#f7f8fa;padding-bottom:100px}
    header{background:#1e293b;padding:30px 20px;color:#fff;border-bottom-left-radius:25px;border-bottom-right-radius:25px}
    .btn{background:#fff;color:#0f172a;border:none;padding:12px 25px;border-radius:20px;font-weight:bold;cursor:pointer;margin-top:10px}
    .container{padding:20px}
    .event-card{background:#fff;padding:15px;margin-bottom:15px;border-radius:15px;box-shadow:0 2px 5px rgba(0,0,0,0.05)}
</style>
</head>
<body>

<header>
    <h2 id="welcomeGreeting">系統啟動中...</h2>
    <div id="authArea"></div>
</header>

<div class="container" id="eventList">載入數據中...</div>

<script>
const CLERK_PUB_KEY = "pk_test_dG9wLWFudC0xLmNsZXJrLmFjY291bnRzLmRldiQ";
const clerk = new Clerk(CLERK_PUB_KEY);

// 更新頁面登入UI抽成獨立函數，方便重複調用
function renderAuthUI() {
    const greeting = document.getElementById("welcomeGreeting");
    const authBox = document.getElementById("authArea");

    if (clerk.user) {
        const email = clerk.user.emailAddresses[0].emailAddress;
        greeting.innerText = email === "1477rene@gmail.com" ? "下午好，管理員 Rene" : "歡迎回來";
        authBox.innerHTML = `<button class="btn" onclick="clerk.signOut().then(() => location.reload())">登出</button>`;
    } else {
        greeting.innerText = "你好，歡迎來到 Re旅行";
        const signInUrl = clerk.buildSignInUrl();
        authBox.innerHTML = `<button class="btn" onclick="window.location.href='${signInUrl}'">前往登入</button>`;
    }
}

// 載入演唱會列表，攜帶登入Token給Workers
async function fetchEvents(retryCount = 0) {
    try {
        const headers = {
            "Content-Type": "application/json"
        };
        // 有登入會話則攜帶授權Token
        if(clerk.session) {
            const token = await clerk.session.getToken();
            headers["Authorization"] = `Bearer ${token}`;
        }

        const response = await fetch("https://hidden-mouse-2636.bmk4byvf9b.workers.dev/api/events", { headers });
        if (!response.ok) throw new Error("API 錯誤");
        const data = await response.json();
        document.getElementById("eventList").innerHTML = data.map(i => 
            `<div class="event-card"><h3>${i.name}</h3><p>票價 HK$ ${i.price}</p></div>`
        ).join('');
    } catch (e) {
        if (retryCount < 2) {
            setTimeout(() => fetchEvents(retryCount + 1), 1000);
        } else {
            document.getElementById("eventList").innerText = "暫時無法連接伺服器，請稍後再試。";
        }
    }
}

// 優化：立即執行初始化，不等待window.onload
async function init() {
    await clerk.load({ localization: { locale: "zh-HK" } });
    
    // 監聽登入狀態變化，登錄/登出自動刷新UI
    clerk.addListener((ev) => {
        if(ev.type === "session") {
            renderAuthUI();
            fetchEvents();
        }
    })

    // 初次渲染登入狀態
    renderAuthUI();
    fetchEvents();
}

// 直接執行，放棄window.onload延遲初始化
init();
</script>
</body>
</html>
