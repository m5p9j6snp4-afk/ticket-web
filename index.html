<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Re售票 | 演唱会购票平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, -apple-system, sans-serif}
body{background:#f7f8fa}
/* 导航栏 */
nav{background:#0a0e17;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;position:sticky;top:0;z-index:99}
.logo{color:#fff;font-size:20px;font-weight:bold}
.nav-links a{color:#cdd2e0;text-decoration:none;margin-left:20px;font-size:14px}
.nav-links a:hover{color:#fff}
/* 容器 */
.container{max-width:1200px;margin:40px auto;padding:0 16px}
.page-title{font-size:24px;margin-bottom:28px;color:#111}
/* 演出卡片列表 */
.event-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px}
.event-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.event-poster{width:100%;height:360px;object-fit:cover}
.event-body{padding:18px}
.event-name{font-size:17px;font-weight:600;margin-bottom:8px;color:#111}
.event-info{color:#666;font-size:14px;margin:4px 0}
.price-text{color:#f43f5e;font-weight:bold;margin:12px 0}
.btn-buy{width:100%;padding:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;color:#fff;border-radius:10px;font-size:15px;cursor:pointer;margin-top:8px}
.btn-buy:active{opacity:0.9}
.empty-tip{text-align:center;padding:80px 0;color:#999;font-size:16px}
</style>
</head>
<body>
<nav>
  <div class="logo">Re售票</div>
  <div class="nav-links">
    <a href="/">首页</a>
    <a href="/mine.html">我的订单</a>
    <a href="/admin.html">商家后台</a>
    <a href="/admin-add-event.html">发布演唱会</a>
  </div>
</nav>
<div class="container">
  <h2 class="page-title">热门演唱会</h2>
  <div class="event-wrap" id="eventList"></div>
</div>
<script>
const API_BASE = "https://hidden-mouse-2636.bmk4byvf9b.workers.dev";
async function loadEvents(){
  const res = await fetch(`${API_BASE}/api/events`);
  const list = await res.json();
  const wrap = document.getElementById("eventList");
  if(list.length === 0){
    wrap.innerHTML = `<div class="empty-tip">暂无演出，请前往后台发布演唱会</div>`;
    return;
  }
  list.forEach(item=>{
    const poster = item.poster || "https://telegra.ph/file/0442023f809d443489830.jpg";
    wrap.innerHTML += `
      <div class="event-card">
        <img class="event-poster" src="${poster}" alt="${item.name}">
        <div class="event-body">
          <h3 class="event-name">${item.name}</h3>
          <p class="event-info">演出日期：${item.date}</p>
          <p class="price-text">HK$ ${item.price} 起</p>
          <button class="btn-buy" onclick="goSeat(${item.id})">立即选座购票</button>
        </div>
      </div>
    `
  })
}
function goSeat(id){location.href=`/seat.html?id=${id}`}
loadEvents();
</script>
</body>
</html>
