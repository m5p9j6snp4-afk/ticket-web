<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>演唱会票务平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, -apple-system}
header{background:#111;color:#fff;padding:16px;display:flex;gap:24px;align-items:center}
header a{color:#fff;text-decoration:none;font-size:15px}
.container{max-width:1100px;margin:30px auto;padding:0 16px}
h2{margin-bottom:24px}
.event-card{border:1px solid #eee;border-radius:12px;overflow:hidden;margin-bottom:24px}
.event-poster{width:100%;height:320px;object-fit:cover;background:#ddd}
.event-info{padding:16px}
.event-card h3{margin-bottom:8px;font-size:18px}
.event-card p{color:#555;margin:4px 0}
.btn{background:#007aff;color:#fff;border:none;padding:12px 16px;border-radius:8px;margin-top:12px;cursor:pointer;font-size:15px}
</style>
</head>
<body>
<header>
  <a href="/">首页</a>
  <a href="/list.html">全部演出</a>
  <a href="/mine.html">我的订单</a>
  <a href="/admin.html">商家后台</a>
</header>
<div class="container">
  <h2>热门演唱会</h2>
  <div id="eventList"></div>
</div>
<script>
const API_BASE = "https://hidden-mouse-2636.bmk4byvf9b.workers.dev";

async function loadEvents(){
  const res = await fetch(`${API_BASE}/api/events`);
  const list = await res.json();
  const wrap = document.getElementById("eventList");
  if(list.length === 0){
    wrap.innerHTML = "<p>暂无演出，请后台添加</p>";
    return;
  }
  list.forEach(item=>{
    // poster为空时使用默认演唱会占位图
    const posterUrl = item.poster || "https://telegra.ph/file/0442023f809d443489830.jpg";
    wrap.innerHTML += `
      <div class="event-card">
        <img class="event-poster" src="${posterUrl}" alt="${item.name}">
        <div class="event-info">
          <h3>${item.name}</h3>
          <p>演出日期：${item.date}</p>
          <p>票价起点：HK$${item.price}</p>
          <button class="btn" onclick="goSeat(${item.id})">立即选座购票</button>
        </div>
      </div>
    `
  })
}
// 跳转选座页面，代替原来的buy下单页
function goSeat(id){
  location.href = `/seat.html?id=${id}`;
}
loadEvents();
</script>
</body>
</html>
