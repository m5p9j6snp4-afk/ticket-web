<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"></script>
<title>Re旅行 | 首页</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f7f8fa;padding-bottom:90px}
header{background:#000;color:#fff;padding:30px 20px;display:flex;justify-content:space-between;align-items:flex-start}
.header-left h1{font-size:26px;font-weight:600}
/* 管理员标签：默认隐藏 */
.admin-tag{background:#333;padding:8px 14px;border-radius:20px;font-size:14px;display:none}
.container{padding:20px}
.grid-row1{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.grid-row2{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.func-btn{background:#fff;border-radius:14px;padding:20px 8px;text-align:center;cursor:pointer}
.func-btn p{font-size:15px;color:#111}
.search-box{width:100%;background:#fff;border-radius:14px;padding:16px 18px;border:none;font-size:15px;margin-bottom:30px}
.bottom-tab{position:fixed;bottom:0;left:0;width:100%;background:#fff;display:flex;border-top:1px solid #eee;z-index:999}
.tab-cell{flex:1;text-align:center;padding:12px 0;cursor:pointer}
.tab-cell p{font-size:12px;color:#777;margin-top:4px;pointer-events:none}
.tab-cell.active p{color:#000;font-weight:600}
</style>
</head>
<body>
<header>
    <div class="header-left"><h1>Re旅行</h1></div>
    <div id="adminTag" class="admin-tag">超级管理员</div>
</header>

<div class="container">
    <div class="grid-row1">
        <div class="func-btn" onclick="location.href='hotel.html'"><p>住宿</p></div>
        <div class="func-btn" onclick="location.href='flight.html'"><p>机票</p></div>
        <div class="func-btn" onclick="location.href='flight-hotel.html'"><p>机票+酒店</p></div>
        <div class="func-btn" onclick="location.href='train.html'"><p>高铁/火车</p></div>
    </div>
    <div class="grid-row2">
        <div class="func-btn" onclick="location.href='homestay.html'"><p>民宿</p></div>
        <div class="func-btn" onclick="location.href='buy.html'"><p>演唱会门票</p></div>
        <div class="func-btn" onclick="location.href='car-rent.html'"><p>租车接送</p></div>
        <div class="func-btn" onclick="location.href='more.html'"><p>更多</p></div>
    </div>
    <input class="search-box" placeholder="搜索目的地、航班、演唱会">
</div>

<div class="bottom-tab">
  <div class="tab-cell active" onclick="location.href='index.html'"><p>首页</p></div>
  <div class="tab-cell" onclick="location.href='message.html'"><p>讯息</p></div>
  <div class="tab-cell" id="publishTab" style="display:none;" onclick="location.href='admin-add-event.html'"><p>发布</p></div>
  <div class="tab-cell" onclick="location.href='mine.html'"><p>我的行程</p></div>
  <div class="tab-cell" onclick="location.href='account.html'"><p>账户</p></div>
</div>

<script>
const CLERK_PUB_KEY = "pk_test_dG9wLWFudC0xLmNsZXJrLmFjY291bnRzLmRldiQ";
const ADMIN_EMAIL = "1477rene@gmail.com"; 
const clerk = new Clerk(CLERK_PUB_KEY);

window.onload = async () => {
    await clerk.load({ localization: { locale: "zh-HK" } });
    
    // 如果已登录，检查身份
    if (clerk.user) {
        const userEmail = clerk.user.primaryEmailAddress.emailAddress;
        if (userEmail === ADMIN_EMAIL) {
            // 是管理员：显示标签和发布入口
            document.getElementById('adminTag').style.display = 'block';
            document.getElementById('publishTab').style.display = 'block';
        }
    }
}
</script>
</body>
</html>
