<!DOCTYPE html>
<html lang="zh-HK">
<head><meta charset="UTF-8"><title>確認預訂</title></head>
<body>
    <h2 id="name"></h2>
    <button onclick="pay()" style="padding:15px;width:100%">確認支付</button>
    <script>
        const params = new URLSearchParams(window.location.search);
        const name = params.get('n');
        document.getElementById('name').innerText = "預訂: " + name;
        function pay() {
            let orders = JSON.parse(localStorage.getItem('orders') || '[]');
            orders.push({ hotelName: name, status: "待確認", time: new Date().toLocaleString() });
            localStorage.setItem('orders', JSON.stringify(orders));
            alert('支付成功！');
            location.href = 'mine.html';
        }
    </script>
</body>
</html>
