<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>發布新演唱會 | Re旅行商家後台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f7f8fa;padding-bottom:100px;color:#333}
nav{background:#0a0e17;padding:16px;color:#fff;display:flex;justify-content:space-between;align-items:center}
nav a{color:#fff;text-decoration:none;font-size:14px}
.container{max-width:600px;margin:20px auto;padding:0 16px}
h2{font-size:20px;font-weight:600;margin-bottom:20px;color:#1e293b}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:14px;font-weight:500;margin-bottom:6px;color:#475569}
.form-group input, .form-group select{width:100%;padding:11px;border:1px solid #cbd5e1;border-radius:10px;font-size:14px;background:#fff}

/* 分區票價樣式 */
.zone-row{display:flex;gap:10px;margin-bottom:10px;align-items:center}
.zone-row input{flex:1}
.btn-remove-zone{background:#ef4444;color:#fff;border:none;padding:8px 12px;border-radius:8px;font-size:12px;cursor:pointer}
.btn-add-zone{background:#e2e8f0;color:#334155;border:none;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;margin-bottom:16px}

.btn-submit{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;width:100%;padding:14px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(79,70,229,0.2);margin-top:10px}

/* 底部導航 */
.bottom-tab{position:fixed;bottom:0;left:0;width:100%;background:#fff;display:flex;border-top:1px solid #e2e8f0;z-index:999}
.tab-cell{flex:1;text-align:center;padding:12px 0;cursor:pointer}
.tab-cell p{font-size:12px;color:#64748b;margin-top:4px;pointer-events:none}
.tab-cell.active p{color:#0f172a;font-weight:600}
</style>
</head>
<body>

<nav>
  <a href="/">← 返回首頁</a>
  <span>商家工作台</span>
</nav>

<div class="container">
  <h2>發布全新熱門演唱會</h2>
  
  <div class="form-group">
    <label>演唱會/活動名稱</label>
    <input type="text" id="eventName" placeholder="例如：周杰倫 2026 世界巡迴演唱會 - 香港站">
  </div>

  <div class="form-group">
    <label>演出日期與時間</label>
    <input type="text" id="eventDate" placeholder="例如：2026年11月20日 20:00">
  </div>

  <div class="form-group">
    <label>海報圖片網址 (Image URL)</label>
    <input type="text" id="eventPoster" placeholder="請貼上圖片連結">
  </div>

  <div class="form-group">
    <label>起步票價 (HK$)</label>
    <input type="number" id="eventPrice" placeholder="最低起步價，例如：780">
  </div>

  <div class="form-group">
    <label style="font-weight: 600; color: #1e293b;">配置座位分區與具體票價</label>
    <div id="zonesContainer">
      <div class="zone-row">
        <input type="text" class="zone-name" placeholder="分區名稱 (如: 內場A區)">
        <input type="number" class="zone-price" placeholder="價格 (如: 1380)">
      </div>
      <div class="zone-row">
        <input type="text" class="zone-name" placeholder="分區名稱 (如: 看台B區)">
        <input type="number" class="zone-price" placeholder="價格 (如: 980)">
      </div>
    </div>
    <button type="button" class="btn-add-zone" onclick="addZoneField()">＋ 增加一個座位分區</button>
  </div>

  <button class="btn-submit" onclick="submitEvent()">確認發布並同步到首頁</button>
</div>

<div class="bottom-tab">
  <div class="tab-cell" onclick="location.href='/'"><p>首頁</p></div>
  <div class="tab-cell" onclick="location.href='/message.html'"><p>訊息</p></div>
  <div class="tab-cell active"><p>發布</p></div>
  <div class="tab-cell" onclick="location.href='/mine.html'"><p>我的行程</p></div>
  <div class="tab-cell" onclick="location.href='/account.html'"><p>帳戶</p></div>
</div>

<script>
const API_BASE = "https://hidden-mouse-2636.bmk4byvf9b.workers.dev";
let adminPwd = "Rene 12345678";

// 動態增加分區輸入框
function addZoneField() {
  const container = document.getElementById("zonesContainer");
  const div = document.createElement("div");
  div.className = "zone-row";
  div.innerHTML = `
    <input type="text" class="zone-name" placeholder="分區名稱">
    <input type="number" class="zone-price" placeholder="價格">
    <button type="button" class="btn-remove-zone" onclick="this.parentElement.remove()">刪除</button>
  `;
  container.appendChild(div);
}

// 提交數據到後端 Worker
async function submitEvent() {
  const name = document.getElementById("eventName").value.trim();
  const date = document.getElementById("eventDate").value.trim();
  const poster = document.getElementById("eventPoster").value.trim();
  const price = document.getElementById("eventPrice").value.trim();

  if (!name || !date || !price) {
    alert("請至少填寫活動名稱、日期與起步票價！");
    return;
  }

  // 收集分區票價陣列
  const zoneNames = document.querySelectorAll(".zone-name");
  const zonePrices = document.querySelectorAll(".zone-price");
  let zones = [];

  for (let i = 0; i < zoneNames.length; i++) {
    const zName = zoneNames[i].value.trim();
    const zPrice = zonePrices[i].value.trim();
    if (zName && zPrice) {
      zones.push({ name: zName, price: Number(zPrice) });
    }
  }

  const payload = {
    pwd: adminPwd,
    name,
    date,
    poster,
    price: Number(price),
    zones: zones
  };

  try {
    const res = await fetch(`${API_BASE}/api/admin/add-event`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (res.ok) {
      alert("🎉 演唱會發布成功！已即時同步至系統首頁！");
      location.href = "/";
    } else {
      const txt = await res.text();
      alert("發布失敗：" + txt);
    }
  } catch (err) {
    alert("網路錯誤，發布失敗");
  }
}
</script>
</body>
</html>
