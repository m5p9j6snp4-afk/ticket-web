<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台新增演唱会</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
.container{max-width:600px;margin:30px auto;padding:0 16px}
h2{text-align:center;margin-bottom:24px}
.form-item{margin:16px 0}
label{display:block;margin-bottom:6px;font-weight:500}
input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px}
.upload-box{border:2px dashed #007aff;padding:30px;text-align:center;border-radius:8px;margin:10px 0}
.preview{max-width:100%;max-height:220px;display:none;margin:10px 0}
.btn{width:100%;background:#007aff;color:#fff;border:none;padding:12px;border-radius:8px;font-size:16px}
.tip{color:#666;font-size:13px}
</style>
</head>
<body>
<div class="container">
  <h2>新增演唱会场次</h2>
  <div class="form-item">
    <label>演唱会海报</label>
    <div class="upload-box" onclick="document.getElementById('imgFile').click()">
      <p>点击上传海报图片（相册选择）</p>
    </div>
    <input type="file" id="imgFile" accept="image/*" style="display:none">
    <img class="preview" id="imgPreview">
    <p class="tip" id="uploadTip"></p>
  </div>

  <div class="form-item">
    <label>演出名称</label>
    <input type="text" id="eventName" placeholder="例如：陈奕迅 香港红馆演唱会">
  </div>
  <div class="form-item">
    <label>演出日期</label>
    <input type="date" id="eventDate">
  </div>
  <div class="form-item">
    <label>基础票价(HK$)</label>
    <input type="number" id="eventPrice" placeholder="780">
  </div>

  <button class="btn" onclick="submitAdd()">保存演唱会</button>
</div>

<script>
const API_BASE = "https://hidden-mouse-2636.bmk4byvf9b.workers.dev";
let posterUrl = "";
const fileInput = document.getElementById("imgFile");
const preview = document.getElementById("imgPreview");
const tip = document.getElementById("uploadTip");

// 相册选图自动上传
fileInput.onchange = async function(e){
  const file = e.target.files[0];
  if(!file) return;
  tip.innerText = "上传中...";
  const formData = new FormData();
  formData.append("file", file);
  try{
    const res = await fetch("https://telegra.ph/upload", {method:"POST", body:formData});
    const json = await res.json();
    posterUrl = "https://telegra.ph" + json[0].src;
    preview.src = posterUrl;
    preview.style.display = "block";
    tip.innerText = "海报上传完成";
  }catch(err){
    tip.innerText = "图片上传失败，请重试";
  }
}

// 提交新增演唱会到D1数据库
async function submitAdd(){
  const pwd = prompt("请输入后台管理员密码");
  if(!pwd) return;
  const name = document.getElementById("eventName").value.trim();
  const date = document.getElementById("eventDate").value;
  const price = Number(document.getElementById("eventPrice").value);
  if(!name || !date || !price){
    alert("请完整填写演出信息");
    return;
  }
  const res = await fetch(`${API_BASE}/api/admin/add-event?pwd=${pwd}`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,date,price,poster:posterUrl})
  });
  const data = await res.json();
  if(data.success){
    alert("演唱会添加成功，首页刷新即可展示");
    location.reload();
  }else{
    alert(data.msg || "添加失败，密码错误");
  }
}
</script>
</body>
</html>
