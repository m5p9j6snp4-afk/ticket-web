<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"></script>
<title>发布演唱会 | Re旅行商家后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f7f8fa;padding-bottom:70px}
nav{background:#0a0e17;padding:14px 16px}
nav a{color:#fff;text-decoration:none}
.container{max-width:620px;margin:30px auto;padding:0 14px}
.page-title{text-align:center;font-size:22px;margin-bottom:28px}
.upload-box{border:2px dashed #6366f1;border-radius:12px;padding:40px 16px;text-align:center;color:#6366f1;margin-bottom:20px;cursor:pointer}
.preview{max-width:100%;max-height:240px;border-radius:10px;display:none;margin:10px 0}
.form-item{margin:20px 0}
label{display:block;margin-bottom:8px;font-weight:500}
input{width:100%;padding:13px;border:1px solid #ddd;border-radius:10px;font-size:15px}
.btn-save{width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;color:#fff;border-radius:10px;font-size:16px;cursor:pointer}
.tip{font-size:14px;color:#666}
.no-perm{text-align:center;margin-top:80px;color:#ef4444;font-size:18px}
.bottom-tab{position:fixed;bottom:0;left:0;width:100%;background:#fff;display:flex;border-top:1px solid #eee;z-index:999}
.tab-cell{flex:1;text-align:center;padding:10px 0;cursor:pointer}
.tab-cell p{font-size:12px;color:#777;margin-top:3px;pointer-events:none}
.tab-cell.active p{color:#111;font-weight:500}
</style>
</head>
<body>
<nav><a href="/">← 返回首页</a></nav>
<div class="container" id="permWrap" style="display:none">
  <div class="no-perm">当前账号无管理员发布权限</div>
</div>
<div class="container" id="formWrap" style="display:none">
  <h2 class="page-title">发布新演唱会</h2>
  <div class="upload-box" onclick="document.getElementById('imgFile').click()">
    <p>点击上传演唱会海报（相册选择）</p>
  </div>
  <input type="file" id="imgFile" accept="image/*" style="display:none">
  <img class="preview" id="imgPreview">
  <p class="tip" id="uploadTip"></p>

  <div class="form-item">
    <label>演出名称</label>
    <input type="text" id="eventName" placeholder="例如：陈奕迅 香港红馆演唱会">
  </div>
  <div class="form-item">
    <label>演出日期</label>
    <input type="date" id="eventDate">
  </div>
  <div class="form-item">
    <label>基础票价 HK$</label>
    <input type="number" id="eventPrice" placeholder="780">
  </div>
  <button class="btn-save" onclick="submitAdd()">保存发布</button>
</div>

<div class="bottom-tab">
  <div class="tab-cell" onclick="location.href='/'"><p>首页</p></div>
  <div class="tab-cell" onclick="location.href='/message.html'"><p>讯息</p></div>
  <div class="tab-cell active"><p>发布</p></div>
  <div class="tab-cell" onclick="location.href='/mine.html'"><p>我的行程</p></div>
  <div class="tab-cell" onclick="location.href='/account.html'"><p>账户</p></div>
</div>

<script>
const API_BASE = "https://hidden-mouse-2636.bmk4byvf9b.workers.dev";
const CLERK_PUB_KEY = "pk_test_dG9wLWFudC0xLmNsZXJrLmFjY291bnRzLmRldiQ";
const clerk = new Clerk(CLERK_PUB_KEY);
let posterUrl = "";
let adminPassword = "Rene 12345678"; 
const fileInput = document.getElementById("imgFile");
const preview = document.getElementById("imgPreview");
const tip = document.getElementById("uploadTip");

window.onload = async function(){
  await clerk.load({
    localization: {
      locale: "zh-CN",
      signIn: { start: { title: "登录 Re旅行", subtitle: "使用您的社交账号继续" } }
    }
  });

  const user = clerk.user;
  if(!user){
    alert("请先登录账号");
    clerk.openSignIn({ afterSignInUrl: window.location.href });
    return;
  }
  
  // 🛡️ 核心修复：提取 Google 登录用户的 Email 地址
  const email = user.emailAddresses[0]?.emailAddress;
  const meta = user.publicMetadata || {};

  // 🌟 只要是你的 Google 邮箱，直接无条件放行
  if (email === "1477rene@gmail.com" || meta.role === "admin") {
    document.getElementById("formWrap").style.display = "block";
    document.getElementById("permWrap").style.display = "none";
    console.log("🎉 发布页面已通过 Google 邮箱直通识别！");
  } else {
    document.getElementById("permWrap").style.display = "block";
    document.getElementById("formWrap").style.display = "none";
  }
}

fileInput.onchange = async function(e){
  const file = e.target.files[0];if(!file)return;
  tip.innerText = "图片上传中...";
  const formData = new FormData();formData.append("file", file);
  try{
    const res = await fetch("https://telegra.ph/upload", {method:"POST", body:formData});
    const json = await res.json();
    posterUrl = "https://telegra.ph" + json[0].src;
    preview.src = posterUrl;preview.style.display = "block";
    tip.innerText = "海报上传完成";
  }catch(err){tip.innerText = "上传失败";}
}

async function submitAdd(){
  const name = document.getElementById("eventName").value.trim();
  const date = document.getElementById("eventDate").value;
  const price = Number(document.getElementById("eventPrice").value);
  if(!name||!date||!price){alert("请完整填写全部演出信息");return;}
  
  const res = await fetch(`${API_BASE}/api/admin/add-event?pwd=${encodeURIComponent(adminPassword)}`,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,date,price,poster:posterUrl})
  });
  const data = await res.json();
  if(data.success){
    alert("演唱会发布成功！刷新首页查看");
    location.href = "/";
  } else {
    alert(data.msg || "发布失败");
  }
}
</script>
</body>
</html>
