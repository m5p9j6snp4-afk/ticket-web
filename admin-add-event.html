<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"></script>
<title>管理后台 | Re旅行</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
    body{background:#f7f8fa;padding-bottom:100px}
    #mainContent{display:none;} /* 默认隐藏所有内容 */
    .container{max-width:600px;margin:20px auto;padding:0 16px}
    h2{margin:20px 0;color:#1e293b}
    .card{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px;box-shadow:0 2px 5px rgba(0,0,0,0.05)}
    .form-group{margin-bottom:15px}
    input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px}
    .btn{background:#000;color:#fff;padding:12px;border:none;border-radius:8px;width:100%;cursor:pointer;margin-top:10px}
    .tab-btn{padding:8px 16px;background:#e2e8f0;border:none;border-radius:6px;margin-right:5px;cursor:pointer}
    .tab-btn.active{background:#000;color:#fff}
    .order-item{border-bottom:1px solid #eee;padding:15px 0}
</style>
</head>
<body>

<div id="mainContent" class="container">
    <h2>发佈新演唱会</h2>
    <div class="card">
        <input type="text" id="eventName" placeholder="活动名称" style="margin-bottom:10px">
        <input type="text" id="eventDate" placeholder="时间 (如: 2026-11-20)" style="margin-bottom:10px">
        <input type="number" id="eventPrice" placeholder="起步价 (HK$)" style="margin-bottom:10px">
        <button class="btn" onclick="submitEvent()">确认发布</button>
    </div>

    <h2>全站订单状态</h2>
    <div style="margin-bottom:15px">
        <button class="tab-btn active" onclick="filterOrder('all', this)">总订单</button>
        <button class="tab-btn" onclick="filterOrder('unpaid', this)">未付款</button>
        <button class="tab-btn" onclick="filterOrder('paid', this)">已付款</button>
    </div>
    <div id="orderList" class="card"></div>
</div>

<script>
const CLERK_PUB_KEY = "pk_test_dG9wLWFudC0xLmNsZXJrLmFjY291bnRzLmRldiQ";
const ADMIN_EMAIL = "your-email@example.com"; // ⚠️ 请替换为你的管理员邮箱
const API_BASE = "https://hidden-mouse-2636.bmk4byvf9b.workers.dev";
const clerk = new Clerk(CLERK_PUB_KEY);
let allOrders = [];

window.onload = async () => {
    await clerk.load();
    // 权限守门员：不是管理员直接踢回首页
    if (!clerk.user || clerk.user.primaryEmailAddress.emailAddress !== ADMIN_EMAIL) {
        location.href = "/";
        return;
    }
    // 权限通过，显示内容
    document.getElementById('mainContent').style.display = 'block';
    loadOrders();
};

async function loadOrders() {
    const res = await fetch(`${API_BASE}/api/admin/list?pwd=Rene 12345678`);
    allOrders = await res.json();
    renderOrders(allOrders);
}

function renderOrders(list) {
    const box = document.getElementById('orderList');
    box.innerHTML = list.length ? list.map(o => `
        <div class="order-item">
            <p><b>${o.event_name}</b> - ${o.username}</p>
            <p>状态: ${o.status === 'paid' ? '✅ 已收款' : '❌ 未付款'}</p>
            ${o.status === 'unpaid' ? `<button onclick="confirmPay('${o.order_no}')">确认收到款项</button>` : ''}
        </div>
    `).join('') : "<p>暂无订单</p>";
}

function filterOrder(status, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderOrders(status === 'all' ? allOrders : allOrders.filter(o => o.status === status));
}

async function submitEvent() {
    const data = {
        pwd: "Rene 12345678",
        name: document.getElementById('eventName').value,
        date: document.getElementById('eventDate').value,
        price: Number(document.getElementById('eventPrice').value)
    };
    await fetch(`${API_BASE}/api/admin/add-event`, {
        method: "POST",
        body: JSON.stringify(data)
    });
    alert("发布成功");
    location.reload();
}
</script>
</body>
</html>
