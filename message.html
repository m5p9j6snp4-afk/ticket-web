<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"></script>
<title>訊息中心 | Re旅行</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f7f8fa;padding-bottom:140px;color:#333}
header{background:linear-gradient(135deg,#0a0e17,#1e293b);padding:20px 16px;color:#fff;border-bottom-left-radius:16px;border-bottom-right-radius:16px;position:relative;z-index:10}
.user-bar{display:flex;justify-content:space-between;align-items:center}
.user-info h2{font-size:18px;font-weight:600}
.user-info p{font-size:12px;color:#94a3b8;margin-top:2px}
.btn-logout{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer}

.container{max-width:620px;margin:20px auto;padding:0 14px}
.page-title{font-size:18px;font-weight:600;margin-bottom:14px;color:#1e293b}

/* 訊息卡片/對話列表樣式 */
.msg-box{background:#fff;border-radius:14px;padding:16px;box-shadow:0 4px 15px rgba(0,0,0,0.03);margin-bottom:12px;display:flex;align-items:flex-start;gap:12px;transition:all 0.2s}
.msg-box.user-send{background:#eef2ff;flex-direction:row-reverse}
.avatar-icon{width:40px;height:40px;border-radius:50%;background:#4f46e5;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:16px;flex-shrink:0}
.avatar-icon.admin-mode{background:#10b981}
.msg-content{flex:1}
.msg-content.user-send{text-align:right}
.msg-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.msg-content.user-send .msg-header{flex-direction:row-reverse}
.sender-name{font-weight:600;font-size:14px;color:#1e293b}
.msg-time{font-size:11px;color:#94a3b8}
.msg-text{font-size:13px;color:#475569;line-height:1.5}

/* 發送訊息輸入框 */
.send-bar{position:fixed;bottom:65px;left:0;width:100%;background:#fff;padding:12px 14px;border-top:1px solid #eee;display:flex;gap:10px;z-index:998}
#msgInput{flex:1;padding:12px 16px;border:1px solid #e2e8f0;border-radius:24px;outline:none;font-size:14px}
#sendBtn{background:#4f46e5;color:#fff;border:none;border-radius:24px;padding:0 18px;cursor:pointer;font-weight:600}

/* 未登入大盒子 */
.no-login-box{background:#fff;border-radius:14px;padding:40px 20px;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,0.03)}
.no-login-box h3{margin-bottom:10px;color:#1e293b}
.no-login-box p{font-size:13px;color:#64748b;margin-bottom:20px}
.btn-login-trigger{background:#4f46e5;color:#fff;border:none;padding:10px 24px;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer}

/* 底部導航 */
.bottom-tab{position:fixed;bottom:0;left:0;width:100%;background:#fff;display:flex;border-top:1px solid #e2e8f0;z-index:999}
.tab-cell{flex:1;text-align:center;padding:12px 0;cursor:pointer}
.tab-cell p{font-size:12px;color:#64748b;margin-top:4px;pointer-events:none}
.tab-cell.active p{color:#0f172a;font-weight:600}
</style>
</head>
<body>

<header>
  <div class="user-bar">
    <div class="user-info">
      <h2 id="msgGreeting">訊息中心</h2>
      <p id="msgSub">隨時掌握您的行程動態</p>
    </div>
    <div id="authBtnWrap"></div>
  </div>
</header>

<div class="container">
  <div class="no-login-box" id="loggedOutView" style="display:none">
    <h3>需要登入帳號</h3>
    <p>登入後即可查看您的訂單通知與客服聊天訊息</p>
    <button class="btn-login-trigger" onclick="clerk.openSignIn({ afterSignInUrl: window.location.href })">立即登入</button>
  </div>

  <div id="loggedInView" style="display:none">
    <div class="page-title" id="chatListTitle">我的聯絡訊息</div>
    <div id="messageListContainer">
      <p style="text-align:center;color:#94a3b8;padding:40px 0;">正在加載通訊快取...</p>
    </div>
  </div>
</div>

<!-- 發送訊息欄，僅普通用戶可見 -->
<div class="send-bar" id="sendBarWrap" style="display:none">
  <input type="text" id="msgInput" placeholder="輸入訊息發送給客服...">
  <button id="sendBtn">發送</button>
</div>

<div class="bottom-tab">
  <div class="tab-cell" onclick="location.href='/'"><p>首頁</p></div>
  <div class="tab-cell active"><p>訊息</p></div>
  <div class="tab-cell" onclick="location.href='/admin-add-event.html'"><p>發布</p></div>
  <div class="tab-cell" onclick="location.href='/mine.html'"><p>我的行程</p></div>
  <div class="tab-cell" onclick="location.href='/account.html'"><p>帳戶</p></div>
</div>

<script>
const API_BASE = "https://hidden-mouse-2636.bmk4byvf9b.workers.dev";
const CLERK_PUB_KEY = "pk_test_dG9wLWFudC0xLmNsZXJrLmFjY291bnRzLmRldiQ";
const clerk = new Clerk(CLERK_PUB_KEY);

function getTimeGreeting() {
  const hr = new Date().getHours();
  if (hr >= 5 && hr < 12) return "早上好";
  if (hr >= 12 && hr < 18) return "下午好";
  return "晚上好";
}

// 獲取當前時間簡寫
function getNowTime() {
  const now = new Date();
  return `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
}

// 新增：追加用戶訊息到聊天框
function appendUserMsg(text) {
  const container = document.getElementById("messageListContainer");
  const nickname = clerk.user.firstName || "旅客";
  const html = `
    <div class="msg-box user-send">
      <div class="avatar-icon">${nickname.slice(0,1)}</div>
      <div class="msg-content user-send">
        <div class="msg-header">
          <span class="sender-name">${nickname}</span>
          <span class="msg-time">${getNowTime()}</span>
        </div>
        <div class="msg-text">${text}</div>
      </div>
    </div>
  `;
  container.insertAdjacentHTML('beforeend', html);
  // 自動滾動到底部
  container.scrollTop = container.scrollHeight;
}

window.onload = async function() {
  await clerk.load({ localization: { locale: "zh-CN" } });

  const user = clerk.user;
  const sendBarWrap = document.getElementById("sendBarWrap");
  const msgInput = document.getElementById("msgInput");
  const sendBtn = document.getElementById("sendBtn");

  // 綁定發送按鈕點擊
  sendBtn.onclick = () => {
    const content = msgInput.value.trim();
    if(!content) return;
    appendUserMsg(content);
    msgInput.value = "";
    // 後續可在此處新增fetch提交訊息到後端
  }
  // 回車發送
  msgInput.onkeydown = (e) => {
    if(e.key === "Enter") sendBtn.click();
  }

  if (user) {
    document.getElementById("loggedInView").style.display = "block";
    document.getElementById("loggedOutView").style.display = "none";
    document.getElementById("authBtnWrap").innerHTML = `<button class="btn-logout" onclick="clerk.signOut().then(() => location.href='/message.html')">登出</button>`;
    
    const email = user.emailAddresses[0]?.emailAddress;
    const meta = user.publicMetadata || {};

    // 🌟 核心管理員 Rene 辨識
    if (email === "1477rene@gmail.com" || meta.role === "admin") {
      sendBarWrap.style.display = "none"; // 管理員隱藏發送框
      document.getElementById("msgGreeting").innerText = `${getTimeGreeting()}，管理員 Rene`;
      document.getElementById("msgSub").innerText = "工作台模式：正在監聽買家諮詢";
      document.getElementById("chatListTitle").innerText = "買家諮詢與待辦訊息 (客服視角)";
      
      loadAdminMessages();
    } else {
      // 普通用戶：顯示輸入框，可發送訊息給客服
      sendBarWrap.style.display = "flex";
      const nickname = user.firstName || "旅客";
      document.getElementById("msgGreeting").innerText = `${getTimeGreeting()}，${nickname}`;
      document.getElementById("msgSub").innerText = "正在與 Re旅行 官方客服對話中";
      
      loadUserMessages();
    }
  } else {
    sendBarWrap.style.display = "none";
    document.getElementById("loggedOutView").style.display = "block";
    document.getElementById("loggedInView").style.display = "none";
  }
}

// 🌟 模擬加載管理員看到的買家諮詢（後期可直接 fetch 你的 D1 數據庫）
function loadAdminMessages() {
  const container = document.getElementById("messageListContainer");
  container.innerHTML = `
    <div class="msg-box" onclick="alert('進入與該買家的聊天室')">
      <div class="avatar-icon admin-mode">買</div>
      <div class="msg-content">
        <div class="msg-header">
          <span class="sender-name">張先生 (測試買家)</span>
          <span class="msg-time">10分鐘前</span>
        </div>
        <div class="msg-text">請問周杰倫演唱會 1A 分區還有現票嗎？我剛才已經上傳轉帳憑證了，麻煩核驗。</div>
      </div>
    </div>
    <div class="msg-box">
      <div class="avatar-icon admin-mode">系</div>
      <div class="msg-content">
        <div class="msg-header">
          <span class="sender-name">系統自動通知</span>
          <span class="msg-time">1小時前</span>
        </div>
        <div class="msg-text">收到一筆新的【機票訂單】，單號：FL8892731，待管理員 Rene 核驗收款。</div>
      </div>
    </div>
  `;
}

// 🌟 普通用戶看到的客服回覆 + 支援發送訊息
function loadUserMessages() {
  const container = document.getElementById("messageListContainer");
  container.innerHTML = `
    <div class="msg-box">
      <div class="avatar-icon">R</div>
      <div class="msg-content">
        <div class="msg-header">
          <span class="sender-name">Re旅行 官方客服</span>
          <span class="msg-time">剛剛</span>
        </div>
        <div class="msg-text">你好！歡迎來到Re旅行。如果您有關於演唱會門票多分區預訂，或者香港出發機票的任何疑問，請隨時發送訊息，我們會在第一時間為您核驗訂單。</div>
      </div>
    </div>
  `;
}
</script>
</body>
</html>
