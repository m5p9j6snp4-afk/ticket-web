<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>选择座位</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
header{background:#111;color:#fff;padding:16px}
header a{color:#fff;text-decoration:none}
.container{max-width:700px;margin:20px auto;padding:0 12px}
.stage{width:80%;margin:0 auto 30px;background:#222;color:#fff;text-align:center;padding:10px;border-radius:6px}
/* 座位布局 */
.seat-row{display:flex;justify-content:center;gap:4px;margin:6px 0}
.seat{width:28px;height:28px;border-radius:4px;cursor:pointer;font-size:10px;text-align:center;line-height:28px}
.seat-normal{background:#b8e0ff;border:1px solid #66a8ff}
.seat-selected{background:#007aff;color:#fff}
.seat-sold{background:#ccc;cursor:not-allowed}
.seat-vip{background:#ffd700;border:1px solid #e6b800}
/* 信息栏 */
.info-box{background:#f5f5f5;padding:14px;border-radius:8px;margin:20px 0}
.tip-line{display:flex;gap:12px;margin:10px 0;justify-content:center}
.tip-item{display:flex;align-items:center;gap:4px;font-size:13px}
.tip-block{width:16px;height:16px;border-radius:3px}
.bottom-bar{position:sticky;bottom:0;background:#fff;padding:16px;border-top:1px solid #eee;margin-top:30px}
.total-text{font-size:18px;font-weight:bold;margin-bottom:10px}
.btn-sub{width:100%;background:#007aff;color:#fff;border:none;padding:12px;border-radius:8px;font-size:16px}
</style>
</head>
<body>
<header>
  <a href="/">← 返回首页</a>
</header>
<div class="container">
  <div class="info-box">
    <h3 id="eventName"></h3>
    <p>演出日期：<span id="eventDate"></span></p>
  </div>

  <div class="stage">舞台</div>

  <!-- 座位区域 -->
  <div id="seatArea"></div>

  <!-- 图例说明 -->
  <div class="tip-line">
    <div class="tip-item"><div class="tip-block seat-normal"></div>普通座</div>
    <div class="tip-item"><div class="tip-block seat-vip"></div>VIP座</div>
    <div class="tip-item"><div class="tip-block seat-selected"></div>已选</div>
    <div class="tip-item"><div class="tip-block seat-sold"></div>已售</div>
  </div>

  <!-- 底部结算 -->
  <div class="bottom-bar">
    <div class="total-text">
      已选座位：<span id="selectedSeats">-</span>
      <br>合计金额：HK$<span id="totalPrice">0</span>
    </div>
    <button class="btn-sub" onclick="confirmSeat()">确认选座，前往填写信息</button>
  </div>
</div>

<script>
const API_BASE = "https://hidden-mouse-2636.bmk4byvf9b.workers.dev";
const urlParams = new URLSearchParams(location.search);
const eventId = urlParams.get("id");
let eventInfo = {};
// 座位配置：模拟场馆，分VIP/普通，部分已售
const seatConfig = {
  rows: 8,
  cols: 12,
  vipRows: [0,1], // 前两排VIP高价
  soldSeats: ["0-2","1-5","3-7","5-10"] // 已被占用座位
};
let selectedList = [];
let basePrice = 0;
let vipPrice = 0;

// 加载演出信息
async function loadEvent(){
  const res = await fetch(`${API_BASE}/api/events`);
  const allEvents = await res.json();
  eventInfo = allEvents.find(item=>item.id == eventId);
  if(!eventInfo){
    alert("演出不存在");
    location.href="/";
    return;
  }
  basePrice = eventInfo.price;
  vipPrice = Math.round(basePrice * 1.5);
  document.getElementById("eventName").innerText = eventInfo.name;
  document.getElementById("eventDate").innerText = eventInfo.date;
  renderSeats();
}

// 渲染座位图
function renderSeats(){
  const wrap = document.getElementById("seatArea");
  wrap.innerHTML = "";
  for(let r=0; r<seatConfig.rows; r++){
    const rowDiv = document.createElement("div");
    rowDiv.className = "seat-row";
    for(let c=0; c<seatConfig.cols; c++){
      const seatId = `${r}-${c}`;
      const seat = document.createElement("div");
      seat.className = "seat";
      seat.dataset.id = seatId;
      seat.innerText = c+1;
      // 判断座位状态
      if(seatConfig.soldSeats.includes(seatId)){
        seat.classList.add("seat-sold");
      }else if(seatConfig.vipRows.includes(r)){
        seat.classList.add("seat-vip");
        seat.dataset.price = vipPrice;
      }else{
        seat.classList.add("seat-normal");
        seat.dataset.price = basePrice;
      }
      // 点击选座
      seat.onclick = ()=>toggleSeat(seat);
      rowDiv.appendChild(seat);
    }
    wrap.appendChild(rowDiv);
  }
}

// 选中/取消座位
function toggleSeat(dom){
  const seatId = dom.dataset.id;
  const price = Number(dom.dataset.price);
  if(dom.classList.contains("seat-sold")) return;
  if(dom.classList.contains("seat-selected")){
    // 取消选中
    dom.classList.remove("seat-selected");
    selectedList = selectedList.filter(s=>s.id !== seatId);
  }else{
    // 最多选6张票，限制数量
    if(selectedList.length >=6){
      alert("单次最多选择6个座位");
      return;
    }
    dom.classList.add("seat-selected");
    selectedList.push({id:seatId, price});
  }
  updateTotal();
}

// 更新总价、选中座位文字
function updateTotal(){
  const seatNames = selectedList.map(s=>s.id).join("、");
  const total = selectedList.reduce((sum,item)=>sum + item.price, 0);
  document.getElementById("selectedSeats").innerText = seatNames || "无";
  document.getElementById("totalPrice").innerText = total;
}

// 确认选座，跳转下单页
function confirmSeat(){
  if(selectedList.length === 0){
    alert("请至少选择一个座位");
    return;
  }
  // 把选中座位带到下单页面
  const seatStr = selectedList.map(s=>s.id).join(",");
  location.href = `/buy.html?id=${eventId}&seats=${seatStr}&total=${document.getElementById("totalPrice").innerText}`;
}
loadEvent();
</script>
</body>
</html>
